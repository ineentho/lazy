session_name: lazy-realworld
windows:
  - window_name: lazy
    layout: tiled
    panes:
      - shell_command:
          - cargo run -- proxy --listen "$LAZY_EXAMPLE_PROXY" --xip-domain "$LAZY_EXAMPLE_XIP_DOMAIN" --xip-ip "$LAZY_EXAMPLE_XIP_IP" --cert "$LAZY_EXAMPLE_CERT" --key "$LAZY_EXAMPLE_KEY"
      - shell_command:
          - cargo run -- http expo --daemon-timeout 10 --cwd examples/apps/expo -- pnpm exec expo start
      - shell_command:
          - cargo run -- http vite --daemon-timeout 10 --cwd examples/apps/vite -- pnpm run dev
      - shell_command:
          - cargo run -- http webpack --daemon-timeout 10 --cwd examples/apps/webpack -- pnpm exec webpack serve --config webpack.config.js
      - shell_command:
          - cargo run -- http fastify --daemon-timeout 10 --cwd examples/apps/fastify -- pnpm run dev
      - shell_command:
          - cargo run -- http spring --daemon-timeout 10 --cwd examples/apps/spring -- mvn spring-boot:run
      - shell_command:
          - cargo run -- http axum --daemon-timeout 10 --cwd examples/apps/axum -- cargo run
      - shell_command:
          - sleep 2
          - while true; do clear; cargo run -- status; sleep 2; done
