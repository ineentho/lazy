[tools]
rust = "1.96.0"
node = "22.14.0"
python = "3.12"
java = "23.0.2"
maven = "3.9.16"
uv = "latest"
tmux = "3.6a"
"pipx:tmuxp" = "1.74.0"

[env]
LAZY_EXAMPLE_PROXY = "0.0.0.0:18443"
LAZY_EXAMPLE_CERT_DIR = ".lazy-example"

[tasks.test]
description = "Run the root Rust test suite"
run = "cargo test"

[tasks.example-status]
description = "Query the example lazy daemon"
run = "cargo run -- status"

[tasks.example-deps]
description = "Install dependencies for every example app"
run = """
set -eu
(cd examples/apps/expo && npm ci)
(cd examples/apps/vite && npm ci)
(cd examples/apps/webpack && npm ci)
(cd examples/apps/fastify && npm ci)
(cd examples/apps/spring && mvn -q -DskipTests dependency:go-offline)
(cd examples/apps/axum && cargo fetch)
"""

[tasks.example-prepare]
description = "Validate and record the xip example configuration"
depends = ["example-deps"]
run = """
set -eu
saved_domain="$(cat "$LAZY_EXAMPLE_CERT_DIR/xip-domain" 2>/dev/null || true)"
saved_ip="$(cat "$LAZY_EXAMPLE_CERT_DIR/xip-ip" 2>/dev/null || true)"
saved_cert="$(cat "$LAZY_EXAMPLE_CERT_DIR/cert-path" 2>/dev/null || true)"
saved_key="$(cat "$LAZY_EXAMPLE_CERT_DIR/key-path" 2>/dev/null || true)"

domain="${LAZY_EXAMPLE_XIP_DOMAIN:-${saved_domain:-xip.example.com}}"
ip="${LAZY_EXAMPLE_XIP_IP:-${saved_ip:-127.0.0.1}}"
cert="${LAZY_EXAMPLE_CERT:-${saved_cert:-$LAZY_EXAMPLE_CERT_DIR/xip.example.com.crt}}"
key="${LAZY_EXAMPLE_KEY:-${saved_key:-$LAZY_EXAMPLE_CERT_DIR/xip.example.com.key}}"

python - "$ip" <<'PYTHON'
import ipaddress
import sys
ipaddress.IPv4Address(sys.argv[1])
PYTHON

if [ ! -r "$cert" ]; then
  printf 'Missing readable wildcard certificate: %s\\n' "$cert" >&2
  printf 'Set LAZY_EXAMPLE_CERT to the certificate for *.%s.\\n' "$domain" >&2
  exit 1
fi
if [ ! -r "$key" ]; then
  printf 'Missing readable private key: %s\\n' "$key" >&2
  printf 'Set LAZY_EXAMPLE_KEY to its path.\\n' >&2
  exit 1
fi

mkdir -p "$LAZY_EXAMPLE_CERT_DIR"
printf '%s\\n' "$domain" > "$LAZY_EXAMPLE_CERT_DIR/xip-domain"
printf '%s\\n' "$ip" > "$LAZY_EXAMPLE_CERT_DIR/xip-ip"
printf '%s\\n' "$cert" > "$LAZY_EXAMPLE_CERT_DIR/cert-path"
printf '%s\\n' "$key" > "$LAZY_EXAMPLE_CERT_DIR/key-path"
"""

[tasks.example-stack]
description = "Load the tmuxp real-world example stack"
depends = ["example-prepare"]
run = "tmuxp load -y examples/tmuxp.yaml"
